name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  # Phase-0 placeholder: Lance CNC Tracker regression suite hook.
  # When tracker test entrypoints are wired into this repo (or invoked via
  # submodule / sibling repo), this job runs them on every PR that touches
  # `shared/` or `migrations/`. R1 + R3 + R5 mitigation. Disabled until
  # tracker integration phase.
  tracker-regression:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "tracker regression placeholder"
